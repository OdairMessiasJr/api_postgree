<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <div class="header-actions">
                <h2>Cadastro de Cliente</h2>
                <a href="consulta.html" class="link-consulta">Ver Consulta &rarr;</a>
            </div>
            <p class="subtitle">Preencha os dados abaixo para registrar um novo cliente.</p>
            
            <div id="alert-message" class="alert hidden"></div>

            <form id="cadastro-form">
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Ex: João da Silva" required>
                </div>

                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" placeholder="Ex: 000.000.000-00" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Ex: joao@email.com" required>
                </div>

                <div class="input-group">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" name="telefone" placeholder="Ex: (11) 90000-0000" required>
                </div>

                <button type="submit" id="submit-btn">
                    <span>Cadastrar</span>
                    <div class="spinner hidden"></div>
                </button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
